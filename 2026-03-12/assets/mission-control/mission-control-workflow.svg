<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520">
  <style>
    .title{font:700 28px Arial;fill:#111827}
    .card{fill:#f9fafb;stroke:#374151;stroke-width:2;rx:14}
    .queue{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:14}
    .gate{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14}
    .fail{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14}
    .h{font:700 19px Arial;fill:#111827}
    .s{font:14px Arial;fill:#374151}
    .arr{stroke:#111827;stroke-width:2.5;marker-end:url(#a)}
    .arrFail{stroke:#dc2626;stroke-width:2.5;marker-end:url(#r)}
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827"/>
    </marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="36" y="48" class="title">Mission Control Task Lifecycle and Fail-Loop (from workflow-engine + docs)</text>

  <rect x="40" y="90" width="190" height="90" class="queue"/>
  <text x="58" y="125" class="h">Planning</text>
  <text x="58" y="150" class="s">AI clarifying Q&A</text>

  <rect x="280" y="90" width="170" height="90" class="queue"/>
  <text x="300" y="125" class="h">Inbox / Assigned</text>
  <text x="300" y="150" class="s">Triage + dispatch</text>

  <rect x="500" y="90" width="170" height="90" class="card"/>
  <text x="550" y="125" class="h">Builder</text>
  <text x="517" y="150" class="s">Create deliverables</text>

  <rect x="720" y="90" width="170" height="90" class="gate"/>
  <text x="775" y="125" class="h">Tester</text>
  <text x="738" y="150" class="s">JS/CSS/resource checks</text>

  <rect x="940" y="90" width="170" height="90" class="gate"/>
  <text x="992" y="125" class="h">Reviewer</text>
  <text x="960" y="150" class="s">Quality + architecture</text>

  <rect x="1140" y="90" width="110" height="90" class="gate"/>
  <text x="1160" y="125" class="h">Done</text>
  <text x="1152" y="150" class="s">Approved</text>

  <line x1="230" y1="135" x2="280" y2="135" class="arr"/>
  <line x1="450" y1="135" x2="500" y2="135" class="arr"/>
  <line x1="670" y1="135" x2="720" y2="135" class="arr"/>
  <line x1="890" y1="135" x2="940" y2="135" class="arr"/>
  <line x1="1110" y1="135" x2="1140" y2="135" class="arr"/>

  <rect x="365" y="300" width="520" height="150" class="fail"/>
  <text x="390" y="335" class="h">Fail loopback policy (fail_targets)</text>
  <text x="390" y="360" class="s">If Testing/Review/Verification fails → route back to Builder stage</text>
  <text x="390" y="385" class="s">Carry reason + artifacts; retry with backoff; cap retries to avoid infinite loop</text>
  <text x="390" y="410" class="s">Learner records patterns into knowledge_entries for future dispatch context</text>

  <line x1="805" y1="180" x2="805" y2="300" class="arrFail"/>
  <line x1="1025" y1="180" x2="1025" y2="300" class="arrFail"/>
  <line x1="365" y1="375" x2="585" y2="180" class="arrFail"/>
</svg>